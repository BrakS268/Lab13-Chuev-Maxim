version: "3.9"

services:

  nats:
    image: nats:2.10-alpine
    container_name: hotel-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--http_port", "8222"]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  checkin-agent-1:
    build:
      context: ./agents/checkin
    container_name: hotel-checkin-agent-1
    environment:
      NATS_URL: nats://nats:4222
      LOG_DIR: /logs
      AGENT_ID: "1"
    volumes:
      - logs:/logs
    depends_on:
      nats:
        condition: service_healthy
    restart: on-failure

  checkin-agent-2:
    build:
      context: ./agents/checkin
    container_name: hotel-checkin-agent-2
    environment:
      NATS_URL: nats://nats:4222
      LOG_DIR: /logs
      AGENT_ID: "2"
    volumes:
      - logs:/logs
    depends_on:
      nats:
        condition: service_healthy
    restart: on-failure

  checkin-agent-3:
    build:
      context: ./agents/checkin
    container_name: hotel-checkin-agent-3
    environment:
      NATS_URL: nats://nats:4222
      LOG_DIR: /logs
      AGENT_ID: "3"
    volumes:
      - logs:/logs
    depends_on:
      nats:
        condition: service_healthy
    restart: on-failure

  orchestrator:
    build:
      context: ./orchestrator
    container_name: hotel-orchestrator
    environment:
      NATS_URL: nats://nats:4222
      LOG_DIR: /logs
    volumes:
      - logs:/logs
    depends_on:
      nats:
        condition: service_healthy
    restart: on-failure

volumes:
  logs:
